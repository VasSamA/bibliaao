name: CI — Biblia.ao

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    name: API (NestJS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: biblia
          POSTGRES_PASSWORD: biblia_ci_password
          POSTGRES_DB: biblia_ao_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U biblia" --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package.json
      - run: npm install
      - run: npx prisma generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://biblia:biblia_ci_password@localhost:5432/biblia_ao_test
      - run: npm run lint --if-present
      - run: npm run build

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package.json
      - run: npm install
      - run: npm run lint --if-present
      - run: npm run build
        env:
          API_URL: http://localhost:4000/api/v1

  security:
    name: Auditoria de segurança (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit API
        working-directory: apps/api
        run: npm audit --audit-level=high || true
      - name: Audit Web
        working-directory: apps/web
        run: npm audit --audit-level=high || true
